<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Login | CotizaIsapre</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Sora',sans-serif;background:#f5f7ff;min-height:100vh;
         display:flex;align-items:center;justify-content:center;}
    .card{background:white;border:1px solid #e2e8f0;border-radius:18px;padding:40px;
          width:100%;max-width:380px;box-shadow:0 8px 32px rgba(37,99,235,.1);}
    .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;
          margin-bottom:28px;justify-content:center;}
    .logo-i{width:38px;height:38px;background:linear-gradient(135deg,#2563eb,#7c3aed);
            border-radius:10px;display:flex;align-items:center;justify-content:center;
            color:white;font-size:19px;}
    h2{font-size:20px;font-weight:800;margin-bottom:6px;}
    p{font-size:14px;color:#64748b;margin-bottom:24px;}
    label{display:block;font-size:11px;font-weight:700;color:#64748b;
          text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
    input[type=password]{width:100%;background:#f5f7ff;border:1.5px solid #e2e8f0;
                         border-radius:10px;padding:12px 14px;font-size:15px;
                         font-family:inherit;outline:none;transition:border-color .2s;}
    input[type=password]:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
    button{width:100%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:white;
           border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;
           cursor:pointer;font-family:inherit;margin-top:16px;
           box-shadow:0 8px 24px rgba(37,99,235,.25);}
    .error{background:#fef2f2;border:1.5px solid #fca5a5;color:#ef4444;
           border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;
           margin-bottom:16px;text-align:center;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><div class="logo-i">🏥</div> CotizaIsapre</div>
    <h2>Panel de administración</h2>
    <p>Ingresa la contraseña para ver los leads recibidos.</p>
    {% if error %}<div class="error">❌ {{ error }}</div>{% endif %}
    <form method="POST">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" autofocus required/>
      <button type="submit">Ingresar →</button>
    </form>
  </div>
</body>
</html>
